name: check-zonas-extremas

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-zonas-extremas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4

      - name: Monitorear fuentes DL 889
        run: python scripts/check_zonas_extremas.py

      - name: Validar datos zona extrema
        run: python scripts/validate_zonas_extremas.py

      - name: Crear pendientes de zona extrema
        run: python scripts/create_zonas_pending_from_report.py

      - name: Enviar pendientes con botones
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_pending_telegram.py

      - name: Verificar cambios permitidos
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain tasas/historico/manual/zonas_extremas.json tasas/historico/manual/zonas_extremas_hashes.json tasas/historico/reportes tasas/historico/pendientes)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit automatico
        if: steps.verify-changed-files.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Monitorear fuentes DL 889 zonas extremas"
          file_pattern: |
            tasas/historico/manual/zonas_extremas.json
            tasas/historico/manual/zonas_extremas_hashes.json
            tasas/historico/reportes/**
            tasas/historico/pendientes/**
