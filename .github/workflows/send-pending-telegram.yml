name: send-pending-telegram

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-pending-telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Enviar pendientes con botones
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_pending_telegram.py

      - name: Verificar cambios
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain tasas/historico/pendientes)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit automatico
        if: steps.verify-changed-files.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Enviar pendientes por Telegram"
          file_pattern: tasas/historico/pendientes/**
